<div class="this-form" id="this-form">
  <form>
    <div class="input-container">
      <div>
        <label for="">First Name*</label>
        <span class="this-error">required</span>
        <input name="fname" type="text" required>
      </div>

      <div>
        <label for="">Last Name*</label>
        <span class="this-error">required</span>
        <input name="lname" type="text" required>
      </div>

      <div>
        <label for="">Email*</label>
        <span class="this-error">required</span>
        <input name="email" type="email" required>
      </div>

      <div>
        <label for="">Phone Number</label>
        <!-- <span class="this-error">required</span> -->
        {literal}
        <input name="the-phone" type="tel" pattern="[0-9]{10,10}" maxlength="10" minlength="10" placeholder="1234567890"
          title="Please enter your 10 digit phone number">
        {/literal}
      </div>

    </div>

    <div class="p-container">
      <p class="by-entering">
        <span class="this-error">required</span>
        <input type="checkbox" required />
        By entering, you will be automatically signed up to receive emails and text messages.
      </p>

      <p class="required"><i>*Required Fields</i></p>
    </div>

    <div class="button-box">
      <button class="a cta-border">GET ON THE LIST</button>
    </div>

  </form>

  <div class="sending">
    <h2>Sending...</h2>
  </div>

</div>
